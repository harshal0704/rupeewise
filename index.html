<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RupeeWise — Premium Financial Intelligence for India</title>
  <meta name="description"
    content="Master your money with AI-powered insights. Track expenses, plan investments, analyze markets, and grow your wealth — all in one premium platform built for India." />
  <meta name="keywords"
    content="RupeeWise, finance app, Indian fintech, investment tracker, UPI tracker, AI financial advisor, stock market India, tax planner, mutual funds, wealth management" />
  <meta name="author" content="RupeeWise" />
  <meta name="theme-color" content="#000000" />

  <!-- Open Graph -->
  <meta property="og:type" content="website" />
  <meta property="og:title" content="RupeeWise — Financial Intelligence for India" />
  <meta property="og:description"
    content="AI-powered personal finance platform. Track, plan, and grow your wealth effortlessly." />
  <meta property="og:image" content="/logo.png" />
  <meta property="og:url" content="https://rupeewise.app" />
  <meta property="og:site_name" content="RupeeWise" />

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="RupeeWise — Financial Intelligence for India" />
  <meta name="twitter:description"
    content="AI-powered personal finance platform. Track, plan, and grow your wealth effortlessly." />
  <meta name="twitter:image" content="/logo.png" />

  <!-- Favicon & PWA -->
  <link rel="icon" type="image/png" href="/logo.png">
  <link rel="apple-touch-icon" href="/logo.png">
  <link rel="manifest" href="/manifest.json">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="RupeeWise">

  <!-- Preconnect -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <!-- Tailwind -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: {
              DEFAULT: 'var(--primary)',
              glow: 'var(--primary-glow)',
              soft: 'var(--primary-soft)'
            },
            secondary: 'var(--secondary)',
            accent: 'var(--accent)',
            text: {
              main: 'var(--text-main)',
              secondary: 'var(--text-secondary)',
              muted: 'var(--text-muted)',
              dim: 'var(--text-dim)'
            },
            surface: {
              0: 'var(--surface-0)',
              1: 'var(--surface-1)',
              2: 'var(--surface-2)',
              3: 'var(--surface-3)',
              4: 'var(--surface-4)',
            }
          },
          fontFamily: {
            sans: ['Inter', 'system-ui', 'sans-serif'],
          },
          animation: {
            'fade-in': 'fadeIn 0.5s ease-out both',
            'fade-in-up': 'fadeInUp 0.6s cubic-bezier(0.16,1,0.3,1) both',
            'fade-in-down': 'fadeInDown 0.6s cubic-bezier(0.16,1,0.3,1) both',
            'scale-in': 'scaleIn 0.4s cubic-bezier(0.34,1.56,0.64,1) both',
            'float': 'float 6s ease-in-out infinite',
            'float-delayed': 'float 6s ease-in-out 2s infinite',
            'float-slow': 'float 8s ease-in-out 1s infinite',
            'pulse-glow': 'pulseGlow 2s ease-in-out infinite',
            'marquee': 'marquee 30s linear infinite',
          },
          keyframes: {
            fadeIn: { 'from': { opacity: '0' }, 'to': { opacity: '1' } },
            fadeInUp: { 'from': { opacity: '0', transform: 'translateY(24px)' }, 'to': { opacity: '1', transform: 'translateY(0)' } },
            fadeInDown: { 'from': { opacity: '0', transform: 'translateY(-24px)' }, 'to': { opacity: '1', transform: 'translateY(0)' } },
            scaleIn: { 'from': { opacity: '0', transform: 'scale(0.95)' }, 'to': { opacity: '1', transform: 'scale(1)' } },
            float: { '0%, 100%': { transform: 'translateY(0)' }, '50%': { transform: 'translateY(-8px)' } },
            pulseGlow: { '0%, 100%': { opacity: '1' }, '50%': { opacity: '0.6' } },
            marquee: { '0%': { transform: 'translateX(0)' }, '100%': { transform: 'translateX(-50%)' } },
          }
        }
      }
    }
  </script>
  <link rel="stylesheet" href="/index.css">

  <!-- JSON-LD Structured Data -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "WebApplication",
    "name": "RupeeWise",
    "description": "AI-powered financial intelligence platform for India. Track expenses, plan investments, analyze markets, and grow wealth.",
    "applicationCategory": "FinanceApplication",
    "operatingSystem": "Web",
    "offers": {
      "@type": "Offer",
      "price": "0",
      "priceCurrency": "INR"
    }
  }
  </script>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>

</html>
